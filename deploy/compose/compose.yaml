services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mastemis
      POSTGRES_USER: mastemis
      POSTGRES_PASSWORD: ${MASTEMIS_POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18 stores clusters in major-version-specific directories.
      # Mount the parent so upgrades and pg_upgrade --link remain possible.
      - ./data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastemis -d mastemis"]
      interval: 5s
      timeout: 3s
      retries: 10
