name: ci
on:
  push:
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore Mastemis.sln
      - run: dotnet format Mastemis.sln --no-restore --verify-no-changes
      - run: dotnet build Mastemis.sln --no-restore --configuration Release
      - run: dotnet test Mastemis.sln --no-build --configuration Release
